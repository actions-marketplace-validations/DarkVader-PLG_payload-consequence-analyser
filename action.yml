name: PayloadGuard
description: Scans a branch before merge and tells you exactly how badly it's going to hurt.
author: DarkVader-PLG

branding:
  icon: shield
  color: red

inputs:
  repo-token:
    description: GitHub token for posting PR comments
    required: false
    default: ${{ github.token }}
  pr-description:
    description: PR description for semantic transparency analysis — pass github.event.pull_request.body
    required: false
    default: ""
  save-markdown:
    description: Filename for the markdown report
    required: false
    default: payloadguard-report.md
  app-id:
    description: GitHub App ID for Check Run posting (optional)
    required: false
    default: ""
  private-key:
    description: GitHub App private key PEM contents for Check Run posting (optional)
    required: false
    default: ""
  installation-id:
    description: GitHub App installation ID for Check Run posting (optional)
    required: false
    default: ""

outputs:
  exit-code:
    description: "PayloadGuard exit code: 0=safe, 1=error, 2=destructive"
    value: ${{ steps.scan.outputs.exit_code }}
  report-path:
    description: Absolute path to the generated markdown report
    value: ${{ steps.scan.outputs.report_path }}
  verdict:
    description: "Verdict string: SAFE, REVIEW, CAUTION, or DESTRUCTIVE"
    value: ${{ steps.scan.outputs.verdict }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Fetch base branch
      shell: bash
      run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

    - name: Run PayloadGuard
      id: scan
      shell: bash
      env:
        PYTHONUTF8: "1"
        PG_PR_DESCRIPTION: ${{ inputs.pr-description }}
        REPORT_PATH: ${{ github.workspace }}/${{ inputs.save-markdown }}
      run: |
        set +e
        python "${{ github.action_path }}/analyze.py" . \
          "${{ github.head_ref }}" "${{ github.base_ref }}" \
          --pr-description "$PG_PR_DESCRIPTION" \
          --save-markdown "$REPORT_PATH"
        EXIT=$?
        echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
        echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        case $EXIT in
          0) echo "verdict=SAFE"        >> "$GITHUB_OUTPUT" ;;
          2) echo "verdict=DESTRUCTIVE" >> "$GITHUB_OUTPUT" ;;
          *) echo "verdict=ERROR"       >> "$GITHUB_OUTPUT" ;;
        esac

    - name: Post PR comment
      if: always()
      uses: actions/github-script@v7
      env:
        REPORT_PATH: ${{ steps.scan.outputs.report_path }}
        GITHUB_TOKEN: ${{ inputs.repo-token }}
      with:
        github-token: ${{ inputs.repo-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- payloadguard-report -->';
          const reportPath = process.env.REPORT_PATH;
          let body;
          try {
            body = marker + '\n' + fs.readFileSync(reportPath, 'utf8');
          } catch (e) {
            body = marker + '\n## ❌ PayloadGuard — Report not generated\n\n`' + String(e) + '`';
          }
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
          });
          const existing = comments.find(c => c.body.startsWith(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
          }

    - name: Post Check Run
      if: always()
      shell: bash
      env:
        PAYLOADGUARD_APP_ID: ${{ inputs.app-id }}
        PAYLOADGUARD_PRIVATE_KEY: ${{ inputs.private-key }}
        PAYLOADGUARD_INSTALLATION_ID: ${{ inputs.installation-id }}
        PAYLOADGUARD_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
        PAYLOADGUARD_REPORT_PATH: ${{ steps.scan.outputs.report_path }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: python "${{ github.action_path }}/post_check_run.py"
